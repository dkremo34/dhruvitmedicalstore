# ===== DEV PROFILE =====

# Database - Local PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/dhruvitmedicaldb
spring.datasource.username=postgres
spring.datasource.password=postgres

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Connection Pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000

# Thymeleaf - no cache for live reload
spring.thymeleaf.cache=false

# Logging - verbose for debugging
logging.level.com.medicalstore=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO
logging.level.org.hibernate.SQL=DEBUG

# OpenAPI / Swagger - enabled
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Session cookie - not secure for localhost
server.servlet.session.cookie.secure=false

# Backup (set to true to enable)
backup.enabled=false
backup.dir=backups
backup.max-files=3
backup.pg-dump-path=pg_dump
backup.pg-restore-path=psql
