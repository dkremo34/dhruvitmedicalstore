<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <title>Stock Inventory | Dhruvit Medical</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <style>
    .s-card { background:#fff; border-radius:10px; padding:18px; box-shadow:0 1px 8px rgba(0,0,0,0.06); border:1px solid #e8edf2; margin-bottom:14px; }
    .s-card-hdr { font-size:13px; font-weight:700; color:#007BFF; margin-bottom:14px; padding-bottom:8px; border-bottom:2px solid #e8f4fd; display:flex; align-items:center; gap:6px; }

    .sum-cards { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:16px; }
    .sum-c {
      background:#fff; padding:14px; border-radius:10px;
      box-shadow:0 1px 8px rgba(0,0,0,0.06); border:1px solid #e8edf2;
      text-align:center; border-left:4px solid; transition:transform 0.2s;
    }
    .sum-c:hover { transform:translateY(-2px); }
    .sum-c.c-blue { border-left-color:#007BFF; }
    .sum-c.c-amber { border-left-color:#FFC107; }
    .sum-c.c-red { border-left-color:#dc3545; }
    .sum-c.c-green { border-left-color:#28A745; }
    .sum-num { font-size:22px; font-weight:800; color:#1e293b; }
    .sum-lbl { font-size:11px; color:#64748b; font-weight:600; text-transform:uppercase; }

    /* Filters */
    .filter-bar {
      display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px;
      padding:14px; background:#f8fafc; border-radius:8px; border:1px solid #e8edf2; margin-bottom:14px;
    }
    .filter-bar label { font-size:11px; font-weight:700; color:#64748b; text-transform:uppercase; display:block; margin-bottom:3px; }
    .filter-bar input, .filter-bar select {
      width:100%; padding:8px 10px; font-size:13px;
      border:2px solid #e2e8f0; border-radius:6px; background:#fff;
      font-family:'Poppins',sans-serif; transition:border-color 0.2s;
    }
    .filter-bar input:focus, .filter-bar select:focus { outline:none; border-color:#007BFF; box-shadow:0 0 0 2px rgba(0,123,255,0.1); }
    .export-row { display:flex; gap:6px; align-items:flex-end; }
    .export-row input { flex:1; }
    .btn-export {
      padding:8px 14px; font-size:12px; font-weight:700; border:none; border-radius:6px;
      background:#28A745; color:#fff; cursor:pointer; white-space:nowrap; transition:background 0.2s;
    }
    .btn-export:hover { background:#218838; }

    /* Table */
    .tbl-wrap { overflow-x:auto; border-radius:8px; border:1px solid #e2e8f0; }
    .s-tbl { width:100%; border-collapse:collapse; min-width:800px; }
    .s-tbl thead th {
      padding:14px 10px; font-size:12px; background:#f8fafc; font-weight:700;
      border:none; border-bottom:2px solid #e2e8f0; color:#64748b;
      text-transform:uppercase; letter-spacing:0.6px; text-align:center;
    }
    .s-tbl tbody tr { transition:background 0.12s; height:auto !important; }
    .s-tbl tbody tr:hover { background:#f8fafc; }
    .s-tbl tbody td {
      padding:9px 10px; border:none; border-bottom:1px solid #f1f5f9;
      font-size:13px; text-align:left; vertical-align:middle;
    }
    .s-tbl .med-name { font-weight:700; color:#1e293b; }

    /* Pill badges */
    .pill { padding:3px 10px; border-radius:10px; font-size:10px; font-weight:700; display:inline-block; }
    .pill-critical { background:#fee2e2; color:#991b1b; }
    .pill-low { background:#fef3c7; color:#92400e; }
    .pill-good { background:#dcfce7; color:#166534; }

    /* Pagination */
    .pag { display:flex; justify-content:center; gap:6px; margin-top:14px; }
    .pag a {
      padding:6px 12px; font-size:12px; font-weight:600; border-radius:6px;
      text-decoration:none; color:#475569; background:#fff;
      border:1px solid #e2e8f0; transition:all 0.15s;
    }
    .pag a:hover { border-color:#007BFF; color:#007BFF; }
    .pag a.active { background:#007BFF; color:#fff; border-color:#007BFF; }

    @media (max-width:768px) { .sum-cards{grid-template-columns:1fr 1fr;} .filter-bar{grid-template-columns:1fr;} }
  </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="page-content">
<div class="container">
  <h2>Stock Inventory</h2>

  <div class="sum-cards">
    <div class="sum-c c-blue"><div class="sum-num" id="totalItems">0</div><div class="sum-lbl">Total Items</div></div>
    <div class="sum-c c-amber"><div class="sum-num" id="lowStock">0</div><div class="sum-lbl">Low Stock</div></div>
    <div class="sum-c c-red"><div class="sum-num" id="needOrder">0</div><div class="sum-lbl">Need Order</div></div>
    <div class="sum-c c-green"><div class="sum-num" id="totalValue">₹0</div><div class="sum-lbl">Today's Orders</div></div>
  </div>

  <div class="filter-bar">
    <div>
      <label>Search Medicine</label>
      <input type="text" id="searchMedicine" placeholder="Type medicine name..." onkeyup="filterTable()">
    </div>
    <div>
      <label>Filter Category</label>
      <select id="filterCategory" onchange="filterTable()">
        <option value="">All Categories</option>
        <option value="Tablet">Tablet</option><option value="Capsule">Capsule</option>
        <option value="Syrup">Syrup</option><option value="Powder">Powder</option>
        <option value="Cream">Cream</option><option value="Injection">Injection</option>
        <option value="Drops">Drops</option>
      </select>
    </div>
  </div>

  <div class="s-card">
    <div class="tbl-wrap">
      <table class="s-tbl" id="stockTable">
        <thead>
          <tr>
            <th style="width:45px;">ID</th>
            <th>Medicine Name</th>
            <th>Manufacturer</th>
            <th>Batch No</th>
            <th style="width:70px;">Qty</th>
            <th>Expiry</th>
            <th>Supplier</th>
            <th>Category</th>
            <th style="width:80px;">Status</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="item : ${inventoryPage}">
            <td th:text="${item.id}"></td>
            <td class="med-name" th:text="${item.medicine.medicineName}"></td>
            <td th:text="${item.medicine.manufacturer}"></td>
            <td th:text="${item.batchNo}"></td>
            <td th:text="${item.quantity}"></td>
            <td th:text="${item.expiryDate}"></td>
            <td th:text="${item.supplierName}"></td>
            <td th:text="${item.medicine.category}"></td>
            <td>
              <span th:if="${item.quantity <= 10}" class="pill pill-critical">Critical</span>
              <span th:if="${item.quantity > 10 and item.quantity <= 50}" class="pill pill-low">Low</span>
              <span th:if="${item.quantity > 50}" class="pill pill-good">Good</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="pag">
    <a th:if="${currentPage > 0}" th:href="@{'/stocks'(page=${currentPage - 1})}">← Prev</a>
    <a th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
       th:href="@{'/stocks'(page=${i})}" th:text="${i + 1}"
       th:classappend="${i == currentPage} ? 'active' : ''"></a>
    <a th:if="${currentPage < totalPages - 1}" th:href="@{'/stocks'(page=${currentPage + 1})}">Next →</a>
  </div>
</div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script>
function filterTable(){
  const q=document.getElementById('searchMedicine').value.toLowerCase();
  const cat=document.getElementById('filterCategory').value;
  let vis=0,low=0,need=0;
  document.querySelectorAll('#stockTable tbody tr').forEach(r=>{
    const med=r.cells[1].innerText.toLowerCase(), c=r.cells[7].innerText, qty=parseInt(r.cells[4].innerText);
    const show=med.includes(q)&&(cat===''||c===cat);
    r.style.display=show?'':'none';
    if(show){vis++;if(qty<=10)need++;else if(qty<=50)low++;}
  });
  document.getElementById('totalItems').textContent=vis;
  document.getElementById('lowStock').textContent=low;
  document.getElementById('needOrder').textContent=need;
}
async function fetchToday(){
  try{const r=await fetch('/stocks/today-orders');const v=await r.json();document.getElementById('totalValue').textContent='₹'+v.toFixed(2);}
  catch(e){document.getElementById('totalValue').textContent='₹0';}
}
document.addEventListener('DOMContentLoaded',()=>{filterTable();fetchToday();});
</script>
</body>
</html>
