<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <title>Orders List | Dhruvit Medical Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <style>
    .s-card { background:#fff; border-radius:10px; padding:18px; box-shadow:0 1px 8px rgba(0,0,0,0.06); border:1px solid #e8edf2; margin-bottom:14px; }

    .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; flex-wrap:wrap; gap:10px; }
    .btn-new {
      padding:9px 18px; font-size:13px; font-weight:700; border:none; border-radius:8px;
      background:linear-gradient(135deg,#007BFF,#0056b3); color:#fff; cursor:pointer;
      text-decoration:none; display:inline-flex; align-items:center; gap:6px;
      box-shadow:0 3px 12px rgba(0,123,255,0.25); transition:all 0.2s;
    }
    .btn-new:hover { transform:translateY(-2px); box-shadow:0 5px 18px rgba(0,123,255,0.35); }

    .filter-grp { display:flex; align-items:center; gap:8px; }
    .filter-grp label { font-size:11px; font-weight:700; color:#64748b; text-transform:uppercase; }
    .filter-grp select {
      padding:7px 10px; font-size:13px; border:2px solid #e2e8f0; border-radius:6px;
      background:#fff; font-family:'Poppins',sans-serif; cursor:pointer;
    }
    .filter-grp select:focus { outline:none; border-color:#007BFF; }

    /* Table */
    .tbl-wrap { overflow-x:auto; border-radius:8px; border:1px solid #e2e8f0; }
    .o-tbl { width:100%; border-collapse:collapse; min-width:780px; }
    .o-tbl thead th {
      padding:14px 10px; font-size:12px; background:#f8fafc; font-weight:700;
      border:none; border-bottom:2px solid #e2e8f0; color:#64748b;
      text-transform:uppercase; letter-spacing:0.6px; text-align:center;
    }
    .o-tbl tbody tr { transition:background 0.12s; }
    .o-tbl tbody tr:hover { background:#f8fafc; }
    .o-tbl tbody td { padding:10px; border:none; border-bottom:1px solid #f1f5f9; font-size:13px; text-align:left; vertical-align:middle; }
    .o-tbl .id-link { color:#007BFF; text-decoration:none; font-weight:700; }
    .o-tbl .id-link:hover { text-decoration:underline; }
    .o-tbl .cust-name { font-weight:600; color:#1e293b; }
    .o-tbl .amt { font-weight:700; }

    /* Pill badges */
    .pill { padding:3px 10px; border-radius:10px; font-size:10px; font-weight:700; display:inline-block; }
    .pill-pending { background:#fef3c7; color:#92400e; }
    .pill-confirmed { background:#dbeafe; color:#1e40af; }
    .pill-ready { background:#dcfce7; color:#166534; }
    .pill-delivered { background:#d1fae5; color:#065f46; }
    .pill-cancelled { background:#fee2e2; color:#991b1b; }

    /* Action controls */
    .act-row { display:flex; gap:6px; align-items:center; }
    .btn-pay {
      padding:4px 12px; font-size:11px; font-weight:700; border:none; border-radius:6px;
      background:#007BFF; color:#fff; cursor:pointer; transition:background 0.15s;
    }
    .btn-pay:hover { background:#0056b3; }
    .act-row select {
      padding:4px 6px; font-size:11px; border:1.5px solid #e2e8f0; border-radius:4px;
      font-family:'Poppins',sans-serif; cursor:pointer;
    }

    /* Modal */
    .modal-overlay { display:none; position:fixed; z-index:2000; left:0; top:0; width:100%; height:100%; background:rgba(15,23,42,0.45); backdrop-filter:blur(2px); }
    .modal-box { background:#fff; padding:22px; border-radius:12px; width:400px; max-width:92%; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); box-shadow:0 20px 60px rgba(0,0,0,0.15); }
    .modal-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; padding-bottom:10px; border-bottom:2px solid #e8f4fd; }
    .modal-top h3 { margin:0; color:#007BFF; font-size:15px; font-weight:700; }
    .modal-x { font-size:22px; color:#94a3b8; cursor:pointer; background:none; border:none; }
    .modal-x:hover { color:#1e293b; }
    .m-field { margin-bottom:10px; }
    .m-field label { display:block; margin-bottom:3px; font-weight:700; color:#475569; font-size:11px; text-transform:uppercase; }
    .m-field input {
      width:100%; padding:8px 10px; border:2px solid #e2e8f0; border-radius:6px;
      font-size:13px; font-family:'Poppins',sans-serif;
    }
    .m-field input:focus { outline:none; border-color:#007BFF; box-shadow:0 0 0 2px rgba(0,123,255,0.1); }
    .m-field input[readonly] { background:#f0f4f8; color:#64748b; }
    .m-footer { display:flex; gap:8px; justify-content:flex-end; margin-top:14px; }
    .m-btn { padding:8px 18px; font-size:13px; font-weight:700; border:none; border-radius:6px; cursor:pointer; font-family:'Poppins',sans-serif; }
    .m-btn-primary { background:#007BFF; color:#fff; }
    .m-btn-secondary { background:#e2e8f0; color:#475569; }
  </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="page-content">
<div class="container">
  <h2>Customer Orders</h2>

  <div class="top-bar">
    <a href="/orders/create" class="btn-new">+ New Order</a>
    <div style="display:flex; gap:10px; align-items:flex-end; flex-wrap:wrap;">
      <div class="filter-grp">
        <label>Export:</label>
        <input type="date" id="startDate" style="padding:7px 10px; font-size:13px; border:2px solid #e2e8f0; border-radius:6px; font-family:'Poppins',sans-serif;">
        <input type="date" id="endDate" style="padding:7px 10px; font-size:13px; border:2px solid #e2e8f0; border-radius:6px; font-family:'Poppins',sans-serif;">
        <button onclick="exportOrders()" style="padding:7px 14px; font-size:12px; font-weight:700; border:none; border-radius:6px; background:#28A745; color:#fff; cursor:pointer;">Export</button>
      </div>
      <div class="filter-grp">
        <label>Status:</label>
      <form method="get">
        <select name="status" onchange="this.form.submit()">
          <option value="">All Orders</option>
          <option value="PENDING" th:selected="${param.status != null and param.status[0] == 'PENDING'}">Pending</option>
          <option value="CONFIRMED" th:selected="${param.status != null and param.status[0] == 'CONFIRMED'}">Confirmed</option>
          <option value="READY" th:selected="${param.status != null and param.status[0] == 'READY'}">Ready</option>
          <option value="DELIVERED" th:selected="${param.status != null and param.status[0] == 'DELIVERED'}">Delivered</option>
          <option value="CANCELLED" th:selected="${param.status != null and param.status[0] == 'CANCELLED'}">Cancelled</option>
        </select>
      </form>
      </div>
    </div>
  </div>

  <div class="s-card">
    <div class="tbl-wrap">
      <table class="o-tbl">
        <thead>
          <tr>
            <th style="width:40px;">ID</th>
            <th>Customer</th>
            <th>Date</th>
            <th>Amount</th>
            <th>Paid</th>
            <th style="width:90px;">Status</th>
            <th style="width:220px;">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="order : ${orders}">
            <td><a class="id-link" th:href="@{/orders/view/{id}(id=${order.id})}" th:text="${order.id}"></a></td>
            <td class="cust-name" th:text="${order.customer.name}"></td>
            <td th:text="${#temporals.format(order.orderDate, 'dd-MM-yyyy HH:mm')}"></td>
            <td class="amt" th:text="'₹' + ${order.finalAmount}"></td>
            <td th:text="'₹' + ${order.amountPaidByCustomer}"></td>
            <td>
              <span th:if="${order.status.name() == 'PENDING'}" class="pill pill-pending" th:text="${order.status}"></span>
              <span th:if="${order.status.name() == 'CONFIRMED'}" class="pill pill-confirmed" th:text="${order.status}"></span>
              <span th:if="${order.status.name() == 'READY'}" class="pill pill-ready" th:text="${order.status}"></span>
              <span th:if="${order.status.name() == 'DELIVERED'}" class="pill pill-delivered" th:text="${order.status}"></span>
              <span th:if="${order.status.name() == 'CANCELLED'}" class="pill pill-cancelled" th:text="${order.status}"></span>
            </td>
            <td>
              <div class="act-row">
                <button class="btn-pay" th:attr="data-oid=${order.id},data-cust=${order.customer.name},data-tot=${order.finalAmount},data-paid=${order.amountPaidByCustomer}" onclick="openPay(this.dataset.oid,this.dataset.cust,this.dataset.tot,this.dataset.paid)">Pay</button>
                <form th:action="@{/orders/update-status}" method="post" style="margin:0;">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                  <input type="hidden" name="orderId" th:value="${order.id}">
                  <select name="status" onchange="this.form.submit()">
                    <option value="PENDING" th:selected="${order.status == T(com.medicalstore.model.Order.OrderStatus).PENDING}">Pending</option>
                    <option value="CONFIRMED" th:selected="${order.status == T(com.medicalstore.model.Order.OrderStatus).CONFIRMED}">Confirmed</option>
                    <option value="READY" th:selected="${order.status == T(com.medicalstore.model.Order.OrderStatus).READY}">Ready</option>
                    <option value="DELIVERED" th:selected="${order.status == T(com.medicalstore.model.Order.OrderStatus).DELIVERED}">Delivered</option>
                    <option value="CANCELLED" th:selected="${order.status == T(com.medicalstore.model.Order.OrderStatus).CANCELLED}">Cancelled</option>
                  </select>
                </form>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
</main>

<div class="modal-overlay" id="payModal">
  <div class="modal-box">
    <div class="modal-top"><h3>💳 Payment</h3><button class="modal-x" onclick="closePay()">&times;</button></div>
    <form th:action="@{/orders/update-payment}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <input type="hidden" id="mOid" name="orderId">
      <div class="m-field"><label>Order ID</label><input type="text" id="dOid" readonly></div>
      <div class="m-field"><label>Customer</label><input type="text" id="dCust" readonly></div>
      <div class="m-field"><label>Total Amount</label><input type="text" id="dTot" readonly></div>
      <div class="m-field"><label>Already Paid</label><input type="text" id="dPaid" readonly></div>
      <div class="m-field"><label>Payment Amount *</label><input type="number" name="amount" id="payAmt" placeholder="Enter amount" step="0.01" min="0" required></div>
      <div class="m-footer">
        <button type="button" class="m-btn m-btn-secondary" onclick="closePay()">Cancel</button>
        <button type="submit" class="m-btn m-btn-primary">Save Payment</button>
      </div>
    </form>
  </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script>
function openPay(id,cust,tot,paid){
  document.getElementById('mOid').value=id;document.getElementById('dOid').value=id;
  document.getElementById('dCust').value=cust;document.getElementById('dTot').value='₹'+tot;
  document.getElementById('dPaid').value='₹'+paid;document.getElementById('payAmt').value='';
  document.getElementById('payModal').style.display='block';
}
function closePay(){document.getElementById('payModal').style.display='none';}
window.onclick=function(e){if(e.target===document.getElementById('payModal'))closePay();};
function exportOrders(){
  const s=document.getElementById('startDate').value, e=document.getElementById('endDate').value;
  if(!s||!e){alert('Select both dates');return;}
  location.href='/orders/export?startDate='+s+'&endDate='+e;
}
</script>
</body>
</html>
