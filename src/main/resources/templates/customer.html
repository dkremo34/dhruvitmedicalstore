<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <title>Customer Management | Dhruvit Medical Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <style>
    .pg-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
    .pg-top h2 { margin:0; }
    .btn-add-cust {
      padding:9px 20px; font-size:13px; font-weight:700; border:none; border-radius:8px;
      background:linear-gradient(135deg,#007BFF,#0056b3); color:#fff; cursor:pointer;
      font-family:'Poppins',sans-serif; display:inline-flex; align-items:center; gap:6px;
      box-shadow:0 3px 12px rgba(0,123,255,0.25); transition:all 0.2s; text-decoration:none;
    }
    .btn-add-cust:hover { transform:translateY(-2px); box-shadow:0 5px 18px rgba(0,123,255,0.35); }

    .s-card { background:#fff; border-radius:10px; padding:18px; box-shadow:0 1px 8px rgba(0,0,0,0.06); border:1px solid #e8edf2; margin-bottom:14px; }
    .s-card-hdr { font-size:13px; font-weight:700; color:#007BFF; margin-bottom:14px; padding-bottom:8px; border-bottom:2px solid #e8f4fd; display:flex; align-items:center; gap:6px; }

    /* Search bar */
    .cust-search-bar { margin-bottom:14px; }
    .cust-search-bar input {
      width:100%; padding:10px 14px 10px 36px; font-size:13px;
      border:2px solid #e2e8f0; border-radius:8px; background:#f8fafc;
      font-family:'Poppins',sans-serif; transition:all 0.2s;
    }
    .cust-search-bar input:focus { outline:none; border-color:#007BFF; background:#fff; box-shadow:0 0 0 3px rgba(0,123,255,0.1); }
    .search-wrap { position:relative; }
    .search-wrap::before { content:'🔍'; position:absolute; left:11px; top:50%; transform:translateY(-50%); font-size:13px; pointer-events:none; }

    /* Table */
    .tbl-wrap { overflow-x:auto; border-radius:8px; border:1px solid #e2e8f0; }
    .c-tbl { width:100%; border-collapse:collapse; }
    .c-tbl thead th {
      padding:14px 12px; font-size:12px; background:#f8fafc; font-weight:700;
      border:none; border-bottom:2px solid #e2e8f0; color:#64748b;
      text-transform:uppercase; letter-spacing:0.6px; text-align:center;
    }
    .c-tbl tbody tr { transition:background 0.12s; }
    .c-tbl tbody tr:hover { background:#f8fafc; }
    .c-tbl tbody td {
      padding:10px 12px; border:none; border-bottom:1px solid #f1f5f9;
      font-size:13px; text-align:left; vertical-align:middle;
    }
    .c-tbl .name-cell { font-weight:700; color:#1e293b; }
    .c-tbl .phone-cell { font-family:monospace; color:#007BFF; font-weight:600; }
    .c-tbl .date-cell { font-size:11px; color:#94a3b8; }
    .c-tbl .empty-row { text-align:center; padding:28px; color:#94a3b8; }

    /* FAB */
    .fab {
      position:fixed; bottom:30px; right:30px; z-index:900;
      width:52px; height:52px; border-radius:50%;
      background:linear-gradient(135deg,#007BFF,#0056b3); color:#fff;
      border:none; font-size:26px; cursor:pointer;
      box-shadow:0 6px 20px rgba(0,123,255,0.35);
      display:flex; align-items:center; justify-content:center;
      transition:all 0.25s;
    }
    .fab:hover { transform:scale(1.1); box-shadow:0 8px 28px rgba(0,123,255,0.45); }

    /* Modal */
    .modal-overlay {
      display:none; position:fixed; z-index:2000;
      left:0; top:0; width:100%; height:100%;
      background:rgba(15,23,42,0.45); backdrop-filter:blur(2px);
    }
    .modal-overlay.active { display:flex; align-items:center; justify-content:center; }
    .modal-box {
      background:#fff; padding:24px; border-radius:12px;
      width:480px; max-width:92%;
      box-shadow:0 20px 60px rgba(0,0,0,0.15);
      animation:modalIn 0.2s ease;
    }
    @keyframes modalIn { from{opacity:0;transform:translateY(-12px);} to{opacity:1;transform:translateY(0);} }
    .modal-top {
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:16px; padding-bottom:10px; border-bottom:2px solid #e8f4fd;
    }
    .modal-top h3 { margin:0; color:#007BFF; font-size:15px; font-weight:700; }
    .modal-x { font-size:22px; color:#94a3b8; cursor:pointer; background:none; border:none; }
    .modal-x:hover { color:#1e293b; }

    .m-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .m-grid label { font-size:11px; font-weight:700; color:#64748b; text-transform:uppercase; letter-spacing:0.3px; display:block; margin-bottom:3px; }
    .m-grid input {
      width:100%; padding:9px 12px; font-size:13px;
      border:2px solid #e2e8f0; border-radius:8px; background:#f8fafc;
      font-family:'Poppins',sans-serif; transition:all 0.2s;
    }
    .m-grid input:focus { outline:none; border-color:#007BFF; background:#fff; box-shadow:0 0 0 3px rgba(0,123,255,0.1); }

    .m-btn {
      width:100%; margin-top:16px; padding:11px; font-size:14px;
      border:none; border-radius:8px; cursor:pointer; font-weight:700;
      font-family:'Poppins',sans-serif; background:linear-gradient(135deg,#007BFF,#0056b3);
      color:#fff; box-shadow:0 4px 14px rgba(0,123,255,0.3); transition:all 0.2s;
    }
    .m-btn:hover { transform:translateY(-2px); box-shadow:0 6px 22px rgba(0,123,255,0.4); }

    .toast { padding:9px 14px; border-radius:8px; font-size:12px; font-weight:600; margin-bottom:10px; animation:slideIn 0.25s ease; }
    .toast-ok { background:#dcfce7; color:#166534; border:1px solid #bbf7d0; }
    .toast-err { background:#fee2e2; color:#991b1b; border:1px solid #fecaca; }
    @keyframes slideIn { from{opacity:0;transform:translateY(-8px);} to{opacity:1;transform:translateY(0);} }
  </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="page-content">
<div class="container">
  <div class="pg-top">
    <h2>Customer Management</h2>
    <button class="btn-add-cust" onclick="openModal()">+ Add Customer</button>
  </div>

  <div th:if="${error}" class="toast toast-err" th:text="${error}"></div>
  <div th:if="${msg}" class="toast toast-ok" th:text="${msg}"></div>

  <div class="s-card">
    <div class="s-card-hdr">👥 Customer List</div>

    <div class="cust-search-bar">
      <div class="search-wrap">
        <input type="text" id="custFilter" placeholder="Search by name, phone, or email..." oninput="filterCustomers()">
      </div>
    </div>

    <div class="tbl-wrap">
      <table class="c-tbl" id="custTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Email</th>
            <th>Address</th>
            <th>Created</th>
          </tr>
        </thead>
        <tbody>
          <tr th:if="${customers.empty}">
            <td colspan="6" class="empty-row">No customers found</td>
          </tr>
          <tr th:each="customer : ${customers}">
            <td th:text="${customer.id}"></td>
            <td class="name-cell" th:text="${customer.name}"></td>
            <td class="phone-cell" th:text="${customer.phone}"></td>
            <td th:text="${customer.email ?: '-'}"></td>
            <td th:text="${customer.address ?: '-'}"></td>
            <td class="date-cell" th:text="${#temporals.format(customer.createdDate, 'dd-MM-yyyy HH:mm')}"></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
</main>

<!-- FAB -->
<button class="fab" onclick="openModal()" title="Add Customer">+</button>

<!-- Add Customer Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal-box">
    <div class="modal-top">
      <h3>➕ Add New Customer</h3>
      <button class="modal-x" onclick="closeModal()">&times;</button>
    </div>
    <form th:action="@{/customer/save}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <div class="m-grid">
        <div><label>Name *</label><input type="text" name="name" placeholder="Customer name" required></div>
        <div><label>Phone *</label><input type="tel" name="phone" placeholder="10-digit phone" pattern="[0-9]{10}" maxlength="10" required></div>
        <div><label>Email</label><input type="email" name="email" placeholder="Optional"></div>
        <div><label>Address</label><input type="text" name="address" placeholder="Optional"></div>
      </div>
      <button type="submit" class="m-btn">✓ Save Customer</button>
    </form>
  </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script>
function openModal(){document.getElementById('addModal').classList.add('active');}
function closeModal(){document.getElementById('addModal').classList.remove('active');}
window.onclick=function(e){if(e.target===document.getElementById('addModal'))closeModal();};
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});

function filterCustomers(){
  const q=document.getElementById('custFilter').value.toLowerCase();
  document.querySelectorAll('#custTable tbody tr').forEach(r=>{
    const txt=r.textContent.toLowerCase();
    r.style.display=txt.includes(q)?'':'none';
  });
}
</script>
</body>
</html>
