<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Medicine Master | Dhruvit Medical</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <style>
    .s-card { background:#fff; border-radius:10px; padding:18px; box-shadow:0 1px 8px rgba(0,0,0,0.06); border:1px solid #e8edf2; margin-bottom:14px; }
    .s-card-hdr { font-size:13px; font-weight:700; color:#007BFF; margin-bottom:14px; padding-bottom:8px; border-bottom:2px solid #e8f4fd; display:flex; align-items:center; gap:6px; }

    /* Summary cards */
    .med-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:16px; }
    .stat-c {
      background:#fff; padding:16px; border-radius:10px;
      box-shadow:0 1px 8px rgba(0,0,0,0.06); border:1px solid #e8edf2;
      text-align:center; border-left:4px solid #007BFF; transition:transform 0.2s;
    }
    .stat-c:hover { transform:translateY(-2px); }
    .stat-num { font-size:24px; font-weight:800; color:#1e293b; }
    .stat-lbl { font-size:11px; color:#64748b; font-weight:600; text-transform:uppercase; }

    /* Search bar for update mode */
    .search-bar {
      display:flex; gap:12px; align-items:flex-end; margin-bottom:16px;
      padding:16px; background:#f8fafc; border-radius:10px; border:1px solid #e8edf2;
    }
    .search-field { flex:1; position:relative; }
    .search-field label {
      font-size:11px; font-weight:700; color:#64748b;
      text-transform:uppercase; letter-spacing:0.4px; display:block; margin-bottom:4px;
    }
    .search-field input {
      width:100%; padding:10px 14px 10px 38px; font-size:14px;
      border:2px solid #e2e8f0; border-radius:8px; background:#fff;
      font-family:'Poppins',sans-serif; transition:all 0.2s; color:#1e293b;
    }
    .search-field input:focus {
      outline:none; border-color:#007BFF; background:#fff;
      box-shadow:0 0 0 4px rgba(0,123,255,0.1);
    }
    .search-field::before {
      content:'🔍'; position:absolute; left:12px; bottom:10px;
      font-size:14px; pointer-events:none;
    }

    /* Autocomplete dropdown */
    .ac-dropdown {
      position:absolute; z-index:300; width:100%; margin-top:3px;
      background:#fff; border-radius:8px; border:1px solid #e2e8f0;
      box-shadow:0 8px 32px rgba(0,0,0,0.12); max-height:240px; overflow-y:auto;
      display:none;
    }
    .ac-dropdown.open { display:block; }
    .ac-item {
      padding:10px 14px; cursor:pointer; font-size:13px; font-weight:500;
      color:#1e293b; border-bottom:1px solid #f1f5f9; transition:background 0.12s;
    }
    .ac-item:last-child { border-bottom:none; }
    .ac-item:hover { background:#f0f7ff; }
    .ac-item .ac-sub { font-size:11px; color:#64748b; font-weight:400; }

    .search-bar .btn-action {
      padding:10px 16px; font-size:13px; font-weight:700; border:none; border-radius:8px;
      cursor:pointer; font-family:'Poppins',sans-serif; transition:all 0.2s; white-space:nowrap;
    }
    .btn-clear { background:#e2e8f0; color:#475569; }
    .btn-clear:hover { background:#cbd5e1; }
    .btn-delete { background:#fee2e2; color:#dc2626; }
    .btn-delete:hover { background:#dc2626; color:#fff; }

    /* Table */
    .tbl-wrap { overflow-x:auto; border-radius:8px; border:1px solid #e2e8f0; }
    .m-tbl { width:100%; border-collapse:collapse; }
    .m-tbl thead th {
      padding:14px 12px; font-size:12px; background:#f8fafc;
      font-weight:700; border:none; border-bottom:2px solid #e2e8f0; color:#64748b;
      text-transform:uppercase; letter-spacing:0.6px; text-align:center; white-space:nowrap;
    }
    .m-tbl tbody tr { transition:background 0.12s; }
    .m-tbl tbody tr:hover { background:#f8fafc; }
    .m-tbl tbody td {
      padding:10px 8px; border:none; border-bottom:1px solid #f1f5f9;
      font-size:13px; text-align:center; vertical-align:middle;
    }
    .m-tbl input, .m-tbl select {
      width:100%; padding:10px 10px; font-size:13px;
      border:2px solid #e2e8f0; border-radius:6px; background:#fff;
      font-family:'Poppins',sans-serif; transition:border-color 0.2s;
      box-sizing:border-box; min-height:38px;
    }
    .m-tbl input:focus, .m-tbl select:focus {
      outline:none; border-color:#007BFF; box-shadow:0 0 0 3px rgba(0,123,255,0.1);
    }
    .m-tbl .btn-submit {
      padding:10px 22px; font-size:13px; font-weight:700; border:none; border-radius:6px;
      background:#007BFF; color:#fff; cursor:pointer; font-family:'Poppins',sans-serif;
      transition:background 0.2s; white-space:nowrap;
    }
    .m-tbl .btn-submit:hover { background:#0056b3; }

    /* Toast */
    .toast { padding:10px 14px; border-radius:8px; font-size:13px; font-weight:600; margin-bottom:12px; }
    .toast-ok { background:#dcfce7; color:#166534; border:1px solid #bbf7d0; }
    .toast-err { background:#fee2e2; color:#991b1b; border:1px solid #fecaca; }
  </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="page-content">
<div class="container" style="max-width:1500px;width:96%;">
  <h2>Medicine Master</h2>

  <!-- Stats -->
  <div class="med-stats">
    <div class="stat-c"><div class="stat-num" id="totalMedicines">0</div><div class="stat-lbl">Total Medicines</div></div>
    <div class="stat-c"><div class="stat-num" id="totalCategories">0</div><div class="stat-lbl">Categories</div></div>
    <div class="stat-c"><div class="stat-num" id="totalManufacturers">0</div><div class="stat-lbl">Manufacturers</div></div>
  </div>

  <p th:if="${error}" th:text="${error}" class="toast toast-err"></p>
  <p th:if="${msg}" th:text="${msg}" class="toast toast-ok"></p>

  <!-- ===== ADD MEDICINE ===== -->
  <div class="s-card" id="addForm" th:style="${param.mode != null and param.mode[0] == 'update'} ? 'display:none;' : 'display:block;'">
    <div class="s-card-hdr">➕ Add New Medicine</div>
    <form action="/medicineSave" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <div class="tbl-wrap">
        <table class="m-tbl">
          <thead>
            <tr>
              <th>Medicine Name</th><th>Generic Name</th><th>Manufacturer</th><th>Category</th>
              <th>Strength</th><th>Unit</th><th>Pack Size</th><th>HSN</th>
              <th>MRP</th><th>GST %</th><th>Storage</th><th>Action</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><input name="medicineName" placeholder="Medicine name" required minlength="2" maxlength="100"></td>
              <td><input name="genericName" placeholder="Generic name"></td>
              <td><input name="manufacturer" placeholder="Manufacturer" required minlength="2" maxlength="100"></td>
              <td>
                <select name="category" required>
                  <option value="">Select</option>
                  <option value="Tablet">Tablet</option><option value="Capsule">Capsule</option>
                  <option value="Syrup">Syrup</option><option value="Injection">Injection</option>
                  <option value="Drops">Drops</option><option value="Cream">Cream</option>
                  <option value="Powder">Powder</option><option value="Ointment">Ointment</option>
                </select>
              </td>
              <td><input name="strength" placeholder="500mg"></td>
              <td>
                <select name="unit">
                  <option value="">Unit</option>
                  <option value="mg">mg</option><option value="ml">ml</option>
                  <option value="gm">gm</option><option value="IU">IU</option><option value="%">%</option>
                </select>
              </td>
              <td><input name="packSize" placeholder="10x10"></td>
              <td><input name="hsn" placeholder="HSN"></td>
              <td><input name="mrp" type="number" placeholder="MRP" min="0" step="0.01"></td>
              <td><input name="gstRate" type="number" placeholder="GST%" min="0" max="28" step="0.01"></td>
              <td>
                <select name="storageCondition">
                  <option value="">Storage</option>
                  <option value="Room Temperature">Room Temp</option><option value="Cool Place">Cool Place</option>
                  <option value="Refrigerate">Refrigerate</option><option value="Freeze">Freeze</option>
                </select>
              </td>
              <td><button class="btn-submit" type="submit">Save</button></td>
            </tr>
          </tbody>
        </table>
      </div>
    </form>
  </div>

  <!-- ===== UPDATE MEDICINE ===== -->
  <div class="s-card" id="updateForm" th:style="${param.mode != null and param.mode[0] == 'update'} ? 'display:block;' : 'display:none;'">
    <div class="s-card-hdr">✏️ Update Medicine</div>
    <form action="/medicineSave" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <input type="hidden" name="id" id="medicineId" />

      <!-- Search Bar -->
      <div class="search-bar">
        <div class="search-field">
          <label>Search Medicine</label>
          <input id="medicineName" placeholder="Start typing medicine name..." autocomplete="off">
          <div id="acDropdown" class="ac-dropdown"></div>
        </div>
        <button type="button" class="btn-action btn-clear" onclick="clearUpdateForm()">Clear</button>
        <button type="button" class="btn-action btn-delete" onclick="deleteMedicine()">Delete</button>
      </div>

      <div class="tbl-wrap">
        <table class="m-tbl">
          <thead>
            <tr>
              <th>Medicine Name</th><th>Generic Name</th><th>Manufacturer</th><th>Category</th>
              <th>Strength</th><th>Unit</th><th>Pack Size</th><th>HSN</th>
              <th>MRP</th><th>GST %</th><th>Storage</th><th>Action</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><input id="displayMedicineName" name="medicineName" placeholder="Medicine name" required minlength="2" maxlength="100"></td>
              <td><input id="genericName" name="genericName" placeholder="Generic name"></td>
              <td><input id="manufacturer" name="manufacturer" placeholder="Manufacturer" required minlength="2" maxlength="100"></td>
              <td>
                <select id="category" name="category" required>
                  <option value="">Select</option>
                  <option value="Tablet">Tablet</option><option value="Capsule">Capsule</option>
                  <option value="Syrup">Syrup</option><option value="Injection">Injection</option>
                  <option value="Drops">Drops</option><option value="Cream">Cream</option>
                  <option value="Powder">Powder</option><option value="Ointment">Ointment</option>
                </select>
              </td>
              <td><input id="strength" name="strength" placeholder="500mg"></td>
              <td>
                <select id="unit" name="unit">
                  <option value="">Unit</option>
                  <option value="mg">mg</option><option value="ml">ml</option>
                  <option value="gm">gm</option><option value="IU">IU</option><option value="%">%</option>
                </select>
              </td>
              <td><input id="packSize" name="packSize" placeholder="10x10"></td>
              <td><input id="hsn" name="hsn" placeholder="HSN"></td>
              <td><input id="mrp" name="mrp" type="number" placeholder="MRP" min="0" step="0.01"></td>
              <td><input id="gstRate" name="gstRate" type="number" placeholder="GST%" min="0" max="28" step="0.01"></td>
              <td>
                <select id="storageCondition" name="storageCondition">
                  <option value="">Storage</option>
                  <option value="Room Temperature">Room Temp</option><option value="Cool Place">Cool Place</option>
                  <option value="Refrigerate">Refrigerate</option><option value="Freeze">Freeze</option>
                </select>
              </td>
              <td><button class="btn-submit" type="submit">Update</button></td>
            </tr>
          </tbody>
        </table>
      </div>
    </form>
  </div>
</div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script>
function deleteMedicine() {
  const id = document.getElementById('medicineId').value;
  const name = document.getElementById('displayMedicineName').value;
  if (!id) { alert('Select a medicine first'); return; }
  if (confirm('Delete "' + name + '"?')) {
    fetch('/api/medicine/delete/' + id, { method: 'DELETE' })
      .then(r => r.text())
      .then(msg => {
        if (msg === 'success') { alert('Deleted!'); clearUpdateForm(); loadMedicineStats(); }
        else alert('Error: ' + msg);
      }).catch(() => alert('Server error'));
  }
}

function loadMedicineStats() {
  fetch('/api/medicine/stats').then(r => r.json()).then(d => {
    document.getElementById('totalMedicines').textContent = d.totalMedicines;
    document.getElementById('totalCategories').textContent = d.totalCategories;
    document.getElementById('totalManufacturers').textContent = d.totalManufacturers;
  }).catch(() => {});
}

function clearUpdateForm() {
  ['medicineName','displayMedicineName','genericName','manufacturer','strength','packSize','hsn','mrp','gstRate','medicineId'].forEach(f => {
    const el = document.getElementById(f); if (el) el.value = '';
  });
  ['category','unit','storageCondition'].forEach(f => {
    const el = document.getElementById(f); if (el) el.value = '';
  });
  document.getElementById('acDropdown').innerHTML = '';
  document.getElementById('acDropdown').classList.remove('open');
}

document.addEventListener('DOMContentLoaded', function() {
  loadMedicineStats();

  const input = document.getElementById('medicineName');
  const dropdown = document.getElementById('acDropdown');
  if (!input || !dropdown) return;

  input.addEventListener('input', function() {
    const q = this.value;
    if (q.length < 2) { dropdown.innerHTML = ''; dropdown.classList.remove('open'); return; }

    fetch('/api/medicine/searchObjects?query=' + encodeURIComponent(q))
      .then(r => r.json())
      .then(data => {
        dropdown.innerHTML = '';
        if (!data.length) { dropdown.classList.remove('open'); return; }
        data.forEach(med => {
          const div = document.createElement('div');
          div.className = 'ac-item';
          div.innerHTML = '<strong>' + med.medicineName + '</strong><div class="ac-sub">' + (med.manufacturer || '') + ' · ' + (med.category || '') + '</div>';
          div.onclick = function() {
            input.value = med.medicineName;
            document.getElementById('displayMedicineName').value = med.medicineName;
            document.getElementById('genericName').value = med.genericName || '';
            document.getElementById('manufacturer').value = med.manufacturer || '';
            document.getElementById('category').value = med.category || '';
            document.getElementById('strength').value = med.strength || '';
            document.getElementById('unit').value = med.unit || '';
            document.getElementById('packSize').value = med.packSize || '';
            document.getElementById('hsn').value = med.hsn || '';
            document.getElementById('mrp').value = med.mrp || '';
            document.getElementById('gstRate').value = med.gstRate || '';
            document.getElementById('storageCondition').value = med.storageCondition || '';
            document.getElementById('medicineId').value = med.id || '';
            dropdown.innerHTML = '';
            dropdown.classList.remove('open');
          };
          dropdown.appendChild(div);
        });
        dropdown.classList.add('open');
      }).catch(() => { dropdown.innerHTML = ''; dropdown.classList.remove('open'); });
  });

  document.addEventListener('click', function(e) {
    if (e.target !== input && !dropdown.contains(e.target)) {
      dropdown.innerHTML = '';
      dropdown.classList.remove('open');
    }
  });
});
</script>
</body>
</html>
