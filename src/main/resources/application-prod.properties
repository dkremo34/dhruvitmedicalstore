# ===== PROD PROFILE (Railway) =====
server.port=${PORT:8080}
server.address=0.0.0.0

# Database - Railway injects these env vars when you add a PostgreSQL plugin
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${POSTGRES_DB}
spring.datasource.password=${POSTGRES_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Connection Pool - tuned for Railway's shared resources
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# Thymeleaf - cache enabled for performance
spring.thymeleaf.cache=true

# Logging - minimal for production
logging.level.com.medicalstore=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN

# OpenAPI / Swagger - disabled in production
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Session cookie - secure in production
server.servlet.session.cookie.secure=true

# Backup
backup.enabled=false
